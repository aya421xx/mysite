    <div class="ttl">「手紙～拝啓 十五の君へ～」 アンジェラ・アキ</div>
    <div class="lyrics">

        <p><span>拝啓 ありがとう 十五のあなたに伝えたい事があるのです</span></p>

        <p><span>自分とは何でどこへ向かうべきか 問い続ければ見えてくる</span></p>

        <p><span>荒れた青春の海は厳しいけれど
            明日の岸辺へと 夢の舟よ進め</span></p>

        <p><span>今 負けないで 泣かないで 消えてしまいそうな時は
            自分の声を信じて歩けばいいの</span></p>
        <p><span>大人の僕も傷ついて眠れない夜はあるけど
            苦くて甘い今を生きている</span></p>

        <p><span>人生の全てに意味があるから 恐れずにあなたの夢を育てて</span></p>
        <p><span>Keep on believing</span></p>
    </div>
